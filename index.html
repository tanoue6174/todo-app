<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f6f2;
        --panel: #ffffff;
        --text: #22252a;
        --muted: #68707a;
        --line: #dedbd2;
        --accent: #246b62;
        --accent-soft: #e3f0ed;
        --warn: #b74335;
        --shadow: 0 16px 38px rgba(28, 31, 35, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(36, 107, 98, 0.08), transparent 280px),
          var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 28px 18px 36px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 8vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      .count,
      .sync-status {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        white-space: nowrap;
      }

      .count {
        min-width: 92px;
        padding: 8px 12px;
        text-align: center;
      }

      .sync-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 6px 10px;
        font-size: 14px;
      }

      .sync-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
      }

      .sync-status.online .sync-dot {
        background: var(--accent);
      }

      .sync-status.error .sync-dot {
        background: var(--warn);
      }

      .composer,
      .settings,
      .list-shell {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .settings {
        display: grid;
        gap: 10px;
        padding: 12px;
        margin-bottom: 14px;
      }

      .settings[open] summary {
        margin-bottom: 2px;
      }

      summary {
        cursor: pointer;
        font-weight: 700;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr auto auto;
        gap: 10px;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr 142px auto;
        gap: 10px;
        padding: 12px;
        margin-bottom: 14px;
      }

      input,
      select {
        min-width: 0;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        outline: none;
      }

      input {
        padding: 0 13px;
      }

      select {
        padding: 0 34px 0 12px;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 107, 98, 0.16);
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(0.96);
      }

      button:active {
        transform: translateY(1px);
      }

      button:disabled {
        cursor: not-allowed;
        filter: grayscale(0.2);
        opacity: 0.55;
      }

      .add-button {
        width: 74px;
        font-weight: 700;
      }

      .secondary-button {
        min-width: 92px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      .list-shell {
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, auto));
        gap: 6px;
      }

      .filter {
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
      }

      .filter[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
      }

      .hint {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .tasks {
        display: grid;
      }

      .task {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px 44px 44px;
        align-items: center;
        gap: 10px;
        min-height: 68px;
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
      }

      .task:last-child {
        border-bottom: 0;
      }

      .task-name {
        min-width: 0;
        overflow-wrap: anywhere;
        line-height: 1.35;
        font-weight: 700;
      }

      .task.done .task-name {
        color: var(--muted);
        text-decoration: line-through;
        text-decoration-thickness: 2px;
      }

      .status {
        min-height: 40px;
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 44px;
        min-height: 44px;
        padding: 0;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      .icon-button.complete {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .icon-button.delete {
        color: var(--warn);
      }

      .empty {
        padding: 34px 18px;
        color: var(--muted);
        text-align: center;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 680px) {
        .settings-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .app {
          padding: 22px 12px 28px;
        }

        header {
          align-items: start;
          flex-direction: column;
          gap: 10px;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .add-button {
          width: 100%;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .filters {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .filter {
          width: 100%;
        }

        .hint {
          white-space: normal;
        }

        .task {
          grid-template-columns: minmax(0, 1fr) 44px 44px;
          gap: 8px;
          padding: 12px;
        }

        .task-name {
          grid-column: 1 / -1;
        }

        .status {
          grid-column: 1 / 2;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Todo</h1>
        <div class="count" id="taskCount">0件</div>
      </header>

      <details class="settings" id="settings">
        <summary>Supabase</summary>
        <form class="settings-grid" id="settingsForm">
          <label class="sr-only" for="supabaseUrl">Supabase URL</label>
          <input id="supabaseUrl" name="supabaseUrl" placeholder="Supabase URL" autocomplete="off" />

          <label class="sr-only" for="supabaseKey">Supabase anon key</label>
          <input id="supabaseKey" name="supabaseKey" placeholder="anon key" autocomplete="off" />

          <button type="submit">保存</button>
          <button class="secondary-button" id="disconnectButton" type="button">解除</button>
        </form>
      </details>

      <form class="composer" id="todoForm">
        <label class="sr-only" for="taskName">タスク名</label>
        <input id="taskName" name="taskName" autocomplete="off" placeholder="タスク名" required />

        <label class="sr-only" for="initialStatus">状態</label>
        <select id="initialStatus" name="initialStatus" aria-label="追加するタスクの状態">
          <option value="todo">未着手</option>
          <option value="doing">着手中</option>
          <option value="done">完了</option>
        </select>

        <button class="add-button" type="submit">追加</button>
      </form>

      <section class="list-shell" aria-label="タスク一覧">
        <div class="toolbar">
          <div class="filters" role="group" aria-label="表示する状態">
            <button class="filter" type="button" data-filter="all" aria-pressed="true">すべて</button>
            <button class="filter" type="button" data-filter="todo" aria-pressed="false">未着手</button>
            <button class="filter" type="button" data-filter="doing" aria-pressed="false">着手中</button>
            <button class="filter" type="button" data-filter="done" aria-pressed="false">完了</button>
          </div>
          <div class="sync-status" id="syncStatus" aria-live="polite">
            <span class="sync-dot"></span>
            <span id="syncText">ローカル保存</span>
          </div>
          <div class="hint" id="visibleCount">表示 0件</div>
        </div>
        <div class="tasks" id="tasks"></div>
      </section>
    </main>

    <template id="taskTemplate">
      <article class="task">
        <div class="task-name"></div>
        <label class="sr-only">状態</label>
        <select class="status" aria-label="状態">
          <option value="todo">未着手</option>
          <option value="doing">着手中</option>
          <option value="done">完了</option>
        </select>
        <button class="icon-button complete" type="button" aria-label="完了にする" title="完了にする">✓</button>
        <button class="icon-button delete" type="button" aria-label="削除" title="削除">×</button>
      </article>
    </template>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const storageKey = "personal-todo-items";
      const configKey = "personal-todo-supabase";
      const form = document.querySelector("#todoForm");
      const taskName = document.querySelector("#taskName");
      const initialStatus = document.querySelector("#initialStatus");
      const tasksEl = document.querySelector("#tasks");
      const taskTemplate = document.querySelector("#taskTemplate");
      const taskCount = document.querySelector("#taskCount");
      const visibleCount = document.querySelector("#visibleCount");
      const filters = [...document.querySelectorAll(".filter")];
      const settings = document.querySelector("#settings");
      const settingsForm = document.querySelector("#settingsForm");
      const supabaseUrl = document.querySelector("#supabaseUrl");
      const supabaseKey = document.querySelector("#supabaseKey");
      const disconnectButton = document.querySelector("#disconnectButton");
      const syncStatus = document.querySelector("#syncStatus");
      const syncText = document.querySelector("#syncText");

      let tasks = loadLocalTasks();
      let filter = "all";
      let db = null;
      let currentUser = null;
      let isRemoteReady = false;

      function loadLocalTasks() {
        try {
          return JSON.parse(localStorage.getItem(storageKey)) ?? [];
        } catch {
          return [];
        }
      }

      function saveLocalTasks() {
        localStorage.setItem(storageKey, JSON.stringify(tasks));
      }

      function loadConfig() {
        try {
          return JSON.parse(localStorage.getItem(configKey)) ?? null;
        } catch {
          return null;
        }
      }

      function saveConfig(config) {
        localStorage.setItem(configKey, JSON.stringify(config));
      }

      function setSyncState(state, message) {
        syncStatus.classList.toggle("online", state === "online");
        syncStatus.classList.toggle("error", state === "error");
        syncText.textContent = message;
      }

      function normalizeTask(row) {
        return {
          id: row.id,
          name: row.name,
          status: row.status,
          createdAt: new Date(row.created_at ?? Date.now()).getTime(),
        };
      }

      async function initializeSupabase() {
        const config = loadConfig();
        if (!config?.url || !config?.key) {
          settings.open = true;
          setSyncState("local", "ローカル保存");
          render();
          return;
        }

        supabaseUrl.value = config.url;
        supabaseKey.value = config.key;
        setSyncState("local", "接続中");

        try {
          db = createClient(config.url, config.key);
          const { data: sessionData, error: sessionError } = await db.auth.getSession();
          if (sessionError) throw sessionError;

          let session = sessionData.session;
          if (!session) {
            const { data, error } = await db.auth.signInAnonymously();
            if (error) throw error;
            session = data.session;
          }

          currentUser = session?.user ?? null;
          if (!currentUser) throw new Error("Supabase user was not created.");

          await loadRemoteTasks();
          isRemoteReady = true;
          setSyncState("online", "Supabase保存");
          settings.open = false;
        } catch (error) {
          console.error(error);
          db = null;
          currentUser = null;
          isRemoteReady = false;
          setSyncState("error", "ローカル保存");
          render();
        }
      }

      async function loadRemoteTasks() {
        const { data, error } = await db
          .from("tasks")
          .select("id,name,status,created_at")
          .order("created_at", { ascending: false });

        if (error) throw error;

        tasks = data.map(normalizeTask);
        saveLocalTasks();
        render();
      }

      async function insertRemoteTask(task) {
        const { data, error } = await db
          .from("tasks")
          .insert({
            id: task.id,
            user_id: currentUser.id,
            name: task.name,
            status: task.status,
          })
          .select("id,name,status,created_at")
          .single();

        if (error) throw error;
        return normalizeTask(data);
      }

      async function updateRemoteTask(id, patch) {
        const { data, error } = await db
          .from("tasks")
          .update(patch)
          .eq("id", id)
          .select("id,name,status,created_at")
          .single();

        if (error) throw error;
        return normalizeTask(data);
      }

      async function deleteRemoteTask(id) {
        const { error } = await db.from("tasks").delete().eq("id", id);
        if (error) throw error;
      }

      function render() {
        tasksEl.replaceChildren();

        const shown = tasks.filter((task) => filter === "all" || task.status === filter);
        taskCount.textContent = `${tasks.length}件`;
        visibleCount.textContent = `表示 ${shown.length}件`;

        if (shown.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = tasks.length === 0 ? "まだタスクはありません。" : "この状態のタスクはありません。";
          tasksEl.append(empty);
          return;
        }

        for (const task of shown) {
          const node = taskTemplate.content.firstElementChild.cloneNode(true);
          const name = node.querySelector(".task-name");
          const status = node.querySelector(".status");
          const complete = node.querySelector(".complete");
          const remove = node.querySelector(".delete");

          node.classList.toggle("done", task.status === "done");
          name.textContent = task.name;
          status.value = task.status;
          status.setAttribute("aria-label", `${task.name} の状態`);
          complete.disabled = task.status === "done";
          complete.title = task.status === "done" ? "完了済み" : "完了にする";
          complete.setAttribute("aria-label", `${task.name} を完了にする`);
          remove.setAttribute("aria-label", `${task.name} を削除`);

          status.addEventListener("change", () => {
            updateTask(task.id, { status: status.value });
          });

          complete.addEventListener("click", () => {
            updateTask(task.id, { status: "done" });
          });

          remove.addEventListener("click", () => {
            removeTask(task.id);
          });

          tasksEl.append(node);
        }
      }

      async function addTask(name, status) {
        let task = {
          id: crypto.randomUUID(),
          name,
          status,
          createdAt: Date.now(),
        };

        tasks = [task, ...tasks];
        saveLocalTasks();
        render();

        if (isRemoteReady) {
          try {
            task = await insertRemoteTask(task);
            tasks = tasks.map((item) => (item.id === task.id ? task : item));
            saveLocalTasks();
            render();
          } catch (error) {
            console.error(error);
            setSyncState("error", "未同期");
          }
        }
      }

      async function updateTask(id, patch) {
        const before = tasks;
        tasks = tasks.map((task) => (task.id === id ? { ...task, ...patch } : task));
        saveLocalTasks();
        render();

        if (isRemoteReady) {
          try {
            const updated = await updateRemoteTask(id, patch);
            tasks = tasks.map((task) => (task.id === id ? updated : task));
            saveLocalTasks();
            render();
          } catch (error) {
            console.error(error);
            tasks = before;
            saveLocalTasks();
            setSyncState("error", "未同期");
            render();
          }
        }
      }

      async function removeTask(id) {
        const before = tasks;
        tasks = tasks.filter((item) => item.id !== id);
        saveLocalTasks();
        render();

        if (isRemoteReady) {
          try {
            await deleteRemoteTask(id);
          } catch (error) {
            console.error(error);
            tasks = before;
            saveLocalTasks();
            setSyncState("error", "未同期");
            render();
          }
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const name = taskName.value.trim();
        if (!name) return;

        await addTask(name, initialStatus.value);
        form.reset();
        taskName.focus();
      });

      settingsForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const url = supabaseUrl.value.trim();
        const key = supabaseKey.value.trim();
        if (!url || !key) return;

        saveConfig({ url, key });
        await initializeSupabase();
      });

      disconnectButton.addEventListener("click", async () => {
        localStorage.removeItem(configKey);
        if (db) await db.auth.signOut();
        db = null;
        currentUser = null;
        isRemoteReady = false;
        supabaseUrl.value = "";
        supabaseKey.value = "";
        settings.open = true;
        tasks = loadLocalTasks();
        setSyncState("local", "ローカル保存");
        render();
      });

      filters.forEach((button) => {
        button.addEventListener("click", () => {
          filter = button.dataset.filter;
          filters.forEach((item) => item.setAttribute("aria-pressed", String(item === button)));
          render();
        });
      });

      render();
      initializeSupabase();
    </script>
  </body>
</html>
